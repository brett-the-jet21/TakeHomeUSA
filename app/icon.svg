    <polygon fill="white" points="20,18 21,20.6 23.8,20.8 21.6,22.3 22.4,25.2 20,23.6 17.6,25.2 18.4,22.3 16.2,20.8 19,20.6"/>
    <polygon fill="white" points="30,16.5 31,19.1 33.8,19.3 31.6,20.8 32.4,23.7 30,22.1 27.7,23.7 28.4,20.8 26.2,19.3 29,19.1"/>
    <polygon fill="white" points="40,18 41,20.6 43.8,20.8 41.6,22.3 42.4,25.2 40,23.6 37.6,25.2 38.4,22.3 36.2,20.8 39,20.6"/>

    <!-- Red/white stripes -->
    <rect y="30" width="60" height="7"  fill="#C0182A"/>
    <rect y="37" width="60" height="6"  fill="#ffffff"/>
    <rect y="43" width="60" height="7"  fill="#C0182A"/>
    <rect y="50" width="60" height="5"  fill="#ffffff"/>

    <!-- Green base -->
    <rect y="55" width="60" height="20" fill="#1DB954"/>

